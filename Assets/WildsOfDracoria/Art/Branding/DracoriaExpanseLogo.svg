<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#18283a"/>
      <stop offset="65%" stop-color="#07101b"/>
      <stop offset="100%" stop-color="#03070d"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff0a8"/>
      <stop offset="35%" stop-color="#d59a28"/>
      <stop offset="70%" stop-color="#8b5517"/>
      <stop offset="100%" stop-color="#ffe28a"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#aab6c6"/>
      <stop offset="100%" stop-color="#4f6077"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="10" flood-color="#000" flood-opacity="0.75"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- circular world emblem -->
  <g filter="url(#shadow)">
    <circle cx="800" cy="315" r="230" fill="#0e1b2b" stroke="url(#gold)" stroke-width="14"/>
    <circle cx="800" cy="315" r="205" fill="#203b54" stroke="#0c121d" stroke-width="6"/>
    <path d="M610 380 C650 260 720 190 800 145 C900 195 965 260 1000 380 Z" fill="#7d8b89" opacity="0.65"/>
    <path d="M675 390 L700 260 L735 350 L760 225 L795 355 L820 200 L855 355 L890 250 L925 390 Z" fill="#d9d3bd" opacity="0.8"/>
    <path d="M615 420 C690 360 760 385 825 350 C900 310 960 350 1010 420 L1010 500 L615 500 Z" fill="#1a4e35"/>
    <path d="M560 500 C665 460 760 475 860 445 C945 420 1030 455 1080 500 L1080 545 L560 545 Z" fill="#173625"/>
    <path d="M765 360 L800 215 L835 360 Z" fill="#d4c8a8"/>
    <path d="M705 385 L735 270 L765 385 Z" fill="#bcb394"/>
    <path d="M835 385 L865 270 L895 385 Z" fill="#bcb394"/>
  </g>

  <!-- dragon silhouette -->
  <g transform="translate(800 420)" filter="url(#shadow)">
    <path d="M-330 30 C-250 -90 -120 -105 -20 -35 C60 -115 190 -105 310 25 C190 -10 70 0 8 65 C-85 2 -210 -5 -330 30 Z" fill="#07101a" stroke="url(#gold)" stroke-width="7"/>
    <path d="M-120 30 C-65 -75 65 -78 135 20 C80 5 35 28 8 72 C-25 32 -70 20 -120 30 Z" fill="#0c1725" stroke="#1c2c3f" stroke-width="5"/>
    <path d="M-10 -80 C75 -85 145 -35 180 30 C95 -10 22 5 -35 75 C-52 12 -42 -45 -10 -80 Z" fill="#0b1420" stroke="url(#gold)" stroke-width="6"/>
    <path d="M95 -38 L170 -75 L132 -10 Z" fill="#0b1420" stroke="url(#gold)" stroke-width="5"/>
    <path d="M17 -90 L62 -140 L45 -72 Z" fill="#0b1420" stroke="url(#gold)" stroke-width="5"/>
    <path d="M92 -30 C140 -10 150 25 120 55 C75 40 40 48 5 78 C25 15 52 -15 92 -30 Z" fill="#0b1420"/>
    <circle cx="112" cy="-4" r="7" fill="#3bd6ff" filter="url(#glow)"/>
  </g>

  <!-- title -->
  <g filter="url(#shadow)">
    <text x="800" y="630" text-anchor="middle" font-size="128" font-family="Georgia, 'Times New Roman', serif" font-weight="900" letter-spacing="8" fill="url(#gold)" stroke="#2c1707" stroke-width="6">DRACORIA</text>
    <text x="800" y="735" text-anchor="middle" font-size="76" font-family="Georgia, 'Times New Roman', serif" font-weight="700" letter-spacing="18" fill="url(#silver)" stroke="#07101a" stroke-width="4">EXPANSE</text>
  </g>

  <!-- compass gem -->
  <g transform="translate(800 795)" filter="url(#shadow)">
    <circle r="52" fill="#0b1320" stroke="url(#gold)" stroke-width="6"/>
    <path d="M0 -82 L14 -18 L82 0 L14 18 L0 82 L-14 18 L-82 0 L-14 -18 Z" fill="url(#gold)" stroke="#2c1707" stroke-width="3"/>
    <path d="M0 -32 L18 0 L0 32 L-18 0 Z" fill="#2bd8ff" stroke="#e8fbff" stroke-width="3" filter="url(#glow)"/>
  </g>

  <!-- small side gems -->
  <g filter="url(#glow)">
    <path d="M390 710 L410 735 L390 760 L370 735 Z" fill="#2bd8ff" stroke="url(#gold)" stroke-width="4"/>
    <path d="M1210 710 L1230 735 L1210 760 L1190 735 Z" fill="#2bd8ff" stroke="url(#gold)" stroke-width="4"/>
  </g>

  <text x="800" y="850" text-anchor="middle" font-size="28" font-family="Verdana, sans-serif" letter-spacing="4" fill="#b7c4d7">A LIVING WORLD MMO</text>
</svg>
